name: Collect DNS seed responses

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Ensure dig is available
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dnsutils

      - name: Collect DNS responses
        run: python3 collector/collect_dns.py

      - name: Commit and push
        run: |
          git config user.name "seeder-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/dns
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "dns: collect $(date -u +'%Y-%m-%dT%H:%MZ')"
          git pull --rebase origin main
          git push origin main
